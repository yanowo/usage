name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re)build, e.g. v0.1.1'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Resolve ref and tag
        id: ref
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "ref=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v5
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install build dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e . py2app

      - name: Build .app
        run: python3 setup_app.py py2app

      - name: Zip .app
        run: |
          if [[ -d dist/main.app && ! -d dist/usage.app ]]; then
            mv dist/main.app dist/usage.app
          fi
          cd dist && zip -r usage.app.zip usage.app

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "${{ steps.ref.outputs.tag }}" >/dev/null 2>&1; then
            gh release create \
              "${{ steps.ref.outputs.tag }}" \
              --target "${{ github.sha }}" \
              --title "${{ steps.ref.outputs.tag }}" \
              --notes ""
          fi

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ steps.ref.outputs.tag }}" dist/usage.app.zip --clobber
